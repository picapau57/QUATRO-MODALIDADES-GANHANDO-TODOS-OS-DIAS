<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1b1c25" />
      <stop offset="100%" stop-color="#0b0c10" />
    </radialGradient>
    
    <!-- Neon Glowing Gradients -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>
    
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bc13fe" />
      <stop offset="100%" stop-color="#7a00ff" />
    </linearGradient>

    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#00aa00" />
    </linearGradient>

    <linearGradient id="neonOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#ff3300" />
    </linearGradient>

    <!-- Filters for Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Base Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1f2937" stroke-width="4" />

  <!-- Neon Glowing Outer Ring -->
  <circle cx="256" cy="256" r="225" fill="none" stroke="url(#neonBlue)" stroke-dasharray="15 8" stroke-width="3" opacity="0.4" filter="url(#glow)" />
  <circle cx="256" cy="256" r="225" fill="none" stroke="url(#neonPurple)" stroke-dasharray="40 40" stroke-width="2" opacity="0.7" />

  <!-- Glowing Nodes of the 4 Modalities -->
  <!-- Top Node (Blue) -->
  <g filter="url(#glow)">
    <circle cx="256" cy="110" r="32" fill="url(#neonBlue)" />
    <circle cx="256" cy="110" r="22" fill="#000000" opacity="0.3" />
    <text x="256" y="116" font-family="'JetBrains Mono', monospace, sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">G</text>
  </g>

  <!-- Right Node (Purple) -->
  <g filter="url(#glow)">
    <circle cx="402" cy="256" r="32" fill="url(#neonPurple)" />
    <circle cx="402" cy="256" r="22" fill="#000000" opacity="0.3" />
    <text x="402" y="262" font-family="'JetBrains Mono', monospace, sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">D</text>
  </g>

  <!-- Bottom Node (Green) -->
  <g filter="url(#glow)">
    <circle cx="256" cy="402" r="32" fill="url(#neonGreen)" />
    <circle cx="256" cy="402" r="22" fill="#000000" opacity="0.3" />
    <text x="256" y="408" font-family="'JetBrains Mono', monospace, sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">M</text>
  </g>

  <!-- Left Node (Orange) -->
  <g filter="url(#glow)">
    <circle cx="110" cy="256" r="32" fill="url(#neonOrange)" />
    <circle cx="110" cy="256" r="22" fill="#000000" opacity="0.3" />
    <text x="110" y="262" font-family="'JetBrains Mono', monospace, sans-serif" font-weight="900" font-size="18" fill="#ffffff" text-anchor="middle">T</text>
  </g>

  <!-- Connected Glowing Lines -->
  <path d="M 256 110 L 402 256 L 256 402 L 110 256 Z" fill="none" stroke="url(#neonBlue)" stroke-width="4" opacity="0.5" filter="url(#glow)" />
  <path d="M 256 110 L 256 402" fill="none" stroke="url(#neonPurple)" stroke-width="2" stroke-dasharray="10 10" opacity="0.4" />
  <path d="M 110 256 L 402 256" fill="none" stroke="url(#neonPurple)" stroke-width="2" stroke-dasharray="10 10" opacity="0.4" />

  <!-- Central Crest: "QM" -->
  <circle cx="256" cy="256" r="60" fill="#0b0c10" stroke="url(#neonBlue)" stroke-width="3" filter="url(#glow)" />
  <text x="256" y="270" font-family="'Inter', system-ui, sans-serif" font-style="italic" font-weight="900" font-size="38" fill="url(#neonBlue)" text-anchor="middle" letter-spacing="-1">QM</text>
</svg>
